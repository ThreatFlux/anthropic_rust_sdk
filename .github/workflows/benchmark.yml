name: Benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: [self-hosted, linux]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      
      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install criterion
        run: cargo install cargo-criterion
      
      - name: Run benchmarks
        id: run_benchmarks
        run: |
          set -euo pipefail
          if [ -d "benches" ]; then
            cargo criterion --message-format=json > benchmark-results.json
            if [ -s "benchmark-results.json" ]; then
              echo "has_results=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_results=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No benchmarks found, skipping..."
            echo "has_results=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Store benchmark result
        if: github.event_name == 'push' && steps.run_benchmarks.outputs.has_results == 'true'
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          name: Rust Benchmarks
          tool: 'cargo'
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '200%'
          comment-always: true
          save-data-file: true
          fail-on-alert: false
